<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<title>Magnum</title>

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #493026;
  color: white;
  overflow-x: hidden;
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  width: 100%;
  overflow: hidden;
}

.hero video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
}

.hero-content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* BOTÓN VOLVER */
.back-home {
  position: fixed;
  top: 18px;
  right: 18px;
  background: linear-gradient(270deg,#ff4ecd,#6c63ff);
  padding: 14px 20px;
  border-radius: 999px;
  color: white;
  text-decoration: none;
  font-size: 15px;
  z-index: 999;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  animation: float 3s ease-in-out infinite;
  transition: transform 0.3s ease;
}

.back-home:hover {
  transform: scale(1.08);
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0); }
}

/* SECCIONES */
section {
  padding: 30px 20px;
  max-width: 1100px;
  margin: auto;
}

/* IMAGEN DESTACADA */
.featured-img {
  width: 100%;
  border-radius: 12px;
  margin-top: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

/* ACORDEÓN */
.accordion {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

@media(min-width:768px){
  .accordion {
    grid-template-columns: repeat(3, 1fr);
  }
}

.accordion-item button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #2b1b14;
  color: white;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.accordion-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
  background: rgba(0,0,0,0.2);
  padding: 0 10px;
  border-radius: 0 0 10px 10px;
}

/* ICONO FLECHA */
.arrow {
  width: 22px;
  height: 22px;
}

/* MERCH */
.grid-2 {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
}

@media(min-width:768px){
  .grid-2 {
    grid-template-columns: 1fr 1fr;
  }
}

.merch-img {
  width: 100%;
  border-radius: 10px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.35);
}

/* RRSS */
.rrss-img {
  width: 100%;
  border-radius: 10px;
}

/* VIDEO */
.video-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: 12px;
  overflow: hidden;
}

.video-wrapper iframe {
  width: 100%;
  height: 100%;
  border: 0;
}

/* FOOTER */
.footer-wrapper {
  position: relative;
  width: 100%;
  margin-top: 40px;
}

.footer-gradient {
  position: absolute;
  top: 0;
  width: 100%;
  height: 120px;
  background: linear-gradient(to bottom, #493026, transparent);
  z-index: 2;
}

.footer-image {
  width: 100%;
  height: 140px;
  background: url("footer-nuevo.png") center/cover no-repeat;
}

.footer-text {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  transform: translateY(-50%);
  z-index: 3;
}

.copyright-box {
  display: inline-block;
  background: rgba(0,0,0,0.5);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
}

/* ANIM */
.fade-in {
  animation: fade 0.6s ease forwards;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<a class="back-home" href="index.html">← Volver</a>

<!-- HERO -->
<header class="hero">
<video autoplay muted loop playsinline>
  <source src="background-nerea.mp4">
</video>
<div class="hero-content">
  <h1>MAGNUM</h1>
</div>
</header>

<!-- IMAGEN DESTACADA -->
<section>
  <img src="destacada-magnum.png" class="featured-img">
</section>

<!-- DESCRIPCIÓN -->
<section>

<p><strong>Proyecto conceptual ficticio</strong></p>

<div class="accordion">

<div class="accordion-item">
<button onclick="toggleAccordion(this)">
Tensión
<img class="arrow" src="flecha-magnum-cerrado.png">
</button>
<div class="accordion-content">
<p><strong>El helado en invierno parece prohibido</strong></p>
</div>
</div>

<div class="accordion-item">
<button onclick="toggleAccordion(this)">
Insight
<img class="arrow" src="flecha-magnum-cerrado.png">
</button>
<div class="accordion-content">
<p><strong>Asociar Magnum con momentos cálidos</strong></p>
</div>
</div>

<div class="accordion-item">
<button onclick="toggleAccordion(this)">
Idea
<img class="arrow" src="flecha-magnum-cerrado.png">
</button>
<div class="accordion-content">
<p><strong>Magnum acompaña el invierno</strong></p>
</div>
</div>

</div>

</section>

<!-- MERCH -->
<section>
<h2>Merchandising</h2>
<div class="grid-2">
<img src="merchandising-magnum-izquierda.png" class="merch-img">
<img src="merchandising-magnum-derecha.png" class="merch-img">
</div>
</section>

<!-- RRSS -->
<section>
<h2>Contenido RRSS</h2>
<img src="rrss_magnum.png" class="rrss-img">
</section>

<!-- VIDEO -->
<section>
<h2>Vídeo</h2>
<div class="video-wrapper">
<iframe src="https://www.youtube.com/embed/dPMp22JkiI0" allowfullscreen></iframe>
</div>
</section>

<!-- FOOTER -->
<div class="footer-wrapper">
<div class="footer-gradient"></div>
<div class="footer-text">
  <div class="copyright-box">© 2026 Neergraphs</div>
</div>
<div class="footer-image"></div>
</div>

<script>

function toggleAccordion(button){
  const item = button.parentElement;
  const content = button.nextElementSibling;
  const img = button.querySelector(".arrow");

  item.classList.toggle("open");

  if(content.style.maxHeight){
    content.style.maxHeight = null;
    img.src = "flecha-magnum-cerrado.png";
  } else {
    content.style.maxHeight = content.scrollHeight + "px";
    img.src = "flecha-magnum-abierto.png";
  }
}

</script>

</body>
</html>
