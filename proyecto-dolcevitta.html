<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <title>Magnum | Dolce Vitta</title>

    <style>
        :root {
            --cake-pink: #f6dede;
            --cake-dark: #493026;
            --cherry-red: #dc1e23;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--cake-pink);
            color: var(--cake-dark);
            overflow-x: hidden;
            line-height: 1.6;
            cursor: none; 
        }

        @media (max-width: 1024px) {
            body { cursor: auto; }
            #custom-cursor, #cursor-trail { display: none !important; }
        }

        /* --- CURSOR CEREZA ORGÁNICA --- */
        #custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
        }

        /* Fruto de la cereza (Achatado y con volumen) */
        #custom-cursor::before {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 5px;
            width: 22px;
            height: 19px;
            background: radial-gradient(circle at 30% 30%, #ff4d4d, var(--cherry-red) 70%, #8b0000);
            border-radius: 50% 50% 48% 48%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        /* Tallo Curvado (Usando un borde para crear la curva) */
        #custom-cursor::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 18px;
            width: 15px;
            height: 20px;
            border-left: 3px solid #2d4a1e; /* Verde oscuro orgánico */
            border-top: 3px solid transparent;
            border-radius: 60% 0 0 0;
            transform: rotate(-10deg);
        }

        #cursor-trail {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999;
        }

        .trail-particle {
            position: absolute;
            width: 5px; height: 5px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFade 0.8s ease-out forwards;
        }

        @keyframes particleFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2) translateY(-15px); }
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .back-home {
            position: fixed;
            top: 25px; right: 25px;
            background: var(--cake-dark);
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .hero {
            height: 65vh;
            width: 100%;
            background: url("hero-dolcevitta.png") center/cover no-repeat;
        }

        section {
            position: relative;
            padding: 60px 20px;
            max-width: 1000px;
            margin: auto;
            z-index: 2;
        }

        .description-box {
            background: rgba(255, 255, 255, 0.4);
            padding: 50px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        /* --- IMÁGENES REDONDEADAS --- */
        .img-project {
            width: 100%;
            display: block;
            border-radius: 50px; /* Muy redondeadas */
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            margin-bottom: 50px;
        }

        .img-project:hover {
            transform: scale(1.03);
        }

        .grid-2 {
            display: grid; gap: 40px; margin-bottom: 50px;
        }

        @media(min-width:768px){
            .grid-2 { grid-template-columns: 1fr 1fr; }
        }

        .icon-row {
            display: flex; justify-content: center; gap: 60px; padding: 40px 0;
        }

        .icon-floating {
            width: 75px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
            animation: floatAnim 4s ease-in-out infinite;
        }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        footer {
            background-color: white;
            color: var(--cake-dark);
            text-align: center;
            padding: 50px;
            font-weight: 600;
        }

    </style>
</head>

<body>

    <div id="custom-cursor"></div>
    <div id="cursor-trail"></div>
    <div id="canvas-container"></div>

    <a class="back-home" href="index.html">← VOLVER</a>

    <header class="hero"></header>

    <section>
        <div class="description-box">
            <p><strong>Dolce Vitta</strong><br>Diseño de identidad visual premium para pastelería creativa.</p>
        </div>
    </section>

    <section>
        <h2>Identidad Visual</h2>
        <img src="aplicaciones-dolcevitta.png" class="img-project">
    </section>

    <section>
        <h2>Packaging</h2>
        <div class="grid-2">
            <img src="cuadrada-dolcevitta-izq.png" class="img-project">
            <img src="cuadrada-dolcevitta-der.png" class="img-project">
        </div>
        <img src="grande-dolcevitta.png" class="img-project">
    </section>

    <section>
        <h2>Social Media Content</h2>
        <img src="imagen-rrss-dolcevitta.png" class="img-project">
    </section>

    <section>
        <h2>Herramientas utilizadas</h2>
        <div class="icon-row">
            <img src="photoshop.png" class="icon-floating">
            <img src="ilustrador.png" class="icon-floating" style="animation-delay: 0.5s;">
        </div>
    </section>

    <footer>© 2026 NEERGRAPHS • DOLCE VITTA</footer>

    <script>
        // --- MOUSE TRAIL ---
        const cursor = document.getElementById('custom-cursor');
        const trailContainer = document.getElementById('cursor-trail');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            if (Math.random() > 0.7) createParticle(e.clientX, e.clientY);
        });

        function createParticle(x, y) {
            const p = document.createElement('div');
            p.className = 'trail-particle';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            trailContainer.appendChild(p);
            setTimeout(() => p.remove(), 800);
        }

        // --- THREE.JS (CEREZAS REALISTAS) ---
        let scene, camera, renderer, cherries = [];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const light = new THREE.PointLight(0xffffff, 1.5);
            light.position.set(5, 5, 5);
            scene.add(light, new THREE.AmbientLight(0xffffff, 0.6));

            function createRealCherry(size, x, y, z) {
                const group = new THREE.Group();
                
                // Cuerpo achatado con "pocito" superior (LatheGeometry)
                const points = [];
                for (let i = 0; i <= 10; i++) {
                    points.push(new THREE.Vector2(Math.sin(i * 0.3) * size, (i - 5) * (size/5)));
                }
                const bodyGeo = new THREE.LatheGeometry(points, 32);
                const bodyMat = new THREE.MeshPhongMaterial({ color: 0xdc1e23, shininess: 100 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.scale.set(1.1, 0.9, 1.1); // Achatar
                
                // Tallo Curvado (Torus truncado o Curve)
                const curve = new THREE.QuadraticBezierCurve3(
                    new THREE.Vector3(0, size*0.8, 0),
                    new THREE.Vector3(size*0.5, size*1.5, 0),
                    new THREE.Vector3(size*1.2, size*2.2, 0)
                );
                const stemGeo = new THREE.TubeGeometry(curve, 20, size*0.05, 8, false);
                const stemMat = new THREE.MeshBasicMaterial({ color: 0x2d4a1e });
                const stem = new THREE.Mesh(stemGeo, stemMat);

                group.add(body, stem);
                group.position.set(x, y, z);
                group.userData = { rot: Math.random() * 0.01 };
                scene.add(group);
                cherries.push(group);
            }

            // Distribución
            createRealCherry(0.6, 5, 2, -2);
            createRealCherry(0.4, -5, 1, -3);
            createRealCherry(0.5, 6, -3, -2);
            createRealCherry(0.3, -6, -2, -1);

            camera.position.z = 8;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            cherries.forEach(c => {
                c.rotation.y += c.userData.rot;
                c.position.y += Math.sin(Date.now() * 0.001) * 0.002;
            });
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
