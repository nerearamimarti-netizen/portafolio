<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <title>Magnum | Dolce Vitta</title>

    <style>
        :root {
            --cake-pink: #f6dede;
            --cake-dark: #493026;
            --cherry-red: #dc1e23;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--cake-pink);
            color: var(--cake-dark);
            overflow-x: hidden;
            line-height: 1.6;
            cursor: none; /* Ocultar cursor por defecto para poner el personalizado */
        }

        /* Ocultar cursor personalizado en móviles */
        @media (max-width: 1024px) {
            body { cursor: auto; }
            #custom-cursor, #cursor-trail { display: none !important; }
        }

        /* --- CURSOR PERSONALIZADO Y RASTRO --- */
        #custom-cursor {
            position: fixed;
            width: 30px;
            height: 35px;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
        }

        /* El cuerpo de la cereza */
        #custom-cursor::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 18px;
            background-color: var(--cherry-red);
            border-radius: 50% 50% 45% 45%; /* Achatada */
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.2);
        }

        /* El tallo */
        #custom-cursor::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 20px;
            background-color: var(--cake-dark);
            border-radius: 2px;
        }

        /* Contenedor del rastro */
        #cursor-trail {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .trail-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.6); /* Humo/azúcar */
            border-radius: 50%;
            pointer-events: none;
            animation: particleFade 1s ease-out forwards;
        }

        @keyframes particleFade {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2) translateY(-20px); }
        }

        /* --- CANVAS THREE.JS (FONDO) --- */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* --- BOTÓN VOLVER --- */
        .back-home {
            position: fixed;
            top: 25px;
            right: 25px;
            background: var(--cake-dark);
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        .back-home:hover { transform: scale(1.05) translateY(-2px); background: #000; }

        /* --- CONTENIDO --- */
        .hero {
            height: 70vh;
            width: 100%;
            background: url("hero-dolcevitta.png") center/cover no-repeat;
            background-color: #e5d1d1;
        }

        section {
            position: relative;
            padding: 80px 20px;
            max-width: 1000px;
            margin: auto;
            z-index: 2;
        }

        .description-box {
            background: rgba(255, 255, 255, 0.4);
            padding: 50px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.03);
            margin-bottom: 40px;
        }

        h2 {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 50px;
        }

        /* --- IMÁGENES ESTILIZADAS --- */
        .img-project {
            width: 100%;
            display: block;
            border-radius: 40px; /* Puntas muy redondeadas */
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            margin-bottom: 50px;
        }

        /* Efecto Hover Delicado */
        .img-project:hover {
            transform: scale(1.03);
            box-shadow: 0 30px 70px rgba(0,0,0,0.15);
        }

        .grid-2 {
            display: grid;
            gap: 40px;
            margin-bottom: 50px;
        }

        @media(min-width:768px){
            .grid-2 { grid-template-columns: 1fr 1fr; }
        }

        /* --- HERRAMIENTAS --- */
        .icon-row {
            display: flex;
            justify-content: center;
            gap: 70px;
            padding: 50px 0;
        }

        .icon-floating {
            width: 75px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            animation: floatAnim 4s ease-in-out infinite;
        }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- FOOTER BLANCO --- */
        footer {
            background-color: white; /* Fondo blanco */
            color: var(--cake-dark);
            text-align: center;
            padding: 60px;
            font-weight: 600;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

    </style>
</head>

<body>

    <div id="custom-cursor"></div>
    <div id="cursor-trail"></div>

    <div id="canvas-container"></div>

    <a class="back-home" href="index.html">← VOLVER</a>

    <header class="hero"></header>

    <section>
        <div class="description-box">
            <p><strong>Dolce Vitta</strong><br>Creación de identidad visual para una pastelería artesanal donde la delicadeza y el sabor se encuentran en cada detalle.</p>
        </div>
    </section>

    <section>
        <h2>Identidad Visual</h2>
        <img src="aplicaciones-dolcevitta.png" class="img-project" alt="Branding">
    </section>

    <section>
        <h2>Packaging premium</h2>
        <div class="grid-2">
            <img src="cuadrada-dolcevitta-izq.png" class="img-project" alt="Pack 1">
            <img src="cuadrada-dolcevitta-der.png" class="img-project" alt="Pack 2">
        </div>
        <img src="grande-dolcevitta.png" class="img-project" alt="Pack 3">
    </section>

    <section>
        <h2>Social Media Content</h2>
        <img src="imagen-rrss-dolcevitta.png" class="img-project" alt="Instagram">
    </section>

    <section>
        <h2>Herramientas utilizadas</h2>
        <div class="icon-row">
            <img src="photoshop.png" class="icon-floating" alt="Photoshop">
            <img src="ilustrador.png" class="icon-floating" alt="Illustrator" style="animation-delay: 0.5s;">
        </div>
    </section>

    <footer>© 2026 NEERGRAPHS • DOLCE VITTA</footer>

    <script>
        // --- CURSOR PERSONALIZADO Y RASTRO ---
        const cursor = document.getElementById('custom-cursor');
        const trailContainer = document.getElementById('cursor-trail');
        let lastX = 0, lastY = 0;

        window.addEventListener('mousemove', (e) => {
            // Mover el cursor principal
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';

            // Crear rastro si el movimiento es significativo
            const dist = Math.hypot(e.clientX - lastX, e.clientY - lastY);
            if (dist > 15) {
                createParticle(e.clientX, e.clientY);
                lastX = e.clientX;
                lastY = e.clientY;
            }
        });

        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.className = 'trail-particle';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            // Tamaño aleatorio sutil
            const size = Math.random() * 6 + 4;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            
            trailContainer.appendChild(particle);
            
            // Borrar partícula después de la animación
            setTimeout(() => {
                particle.remove();
            }, 1000);
        }

        // --- CONFIGURACIÓN THREE.JS (FONDO CON VARIAS CEREZAS ACHATADAS) ---
        let scene, camera, renderer, points, cherries = [];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Luces
            const light = new THREE.DirectionalLight(0xffffff, 1.3);
            light.position.set(5, 5, 5);
            scene.add(light, new THREE.AmbientLight(0xffffff, 0.8));

            // Partículas de fondo (Topping)
            const pGeo = new THREE.BufferGeometry();
            const pPos = [];
            for (let i = 0; i < 250; i++) pPos.push(Math.random()*25-12.5, Math.random()*25-12.5, Math.random()*25-12.5);
            pGeo.setAttribute('position', new THREE.Float32BufferAttribute(pPos, 3));
            points = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.6 }));
            scene.add(points);

            // --- FUNCIÓN PARA CREAR CEREZA ACHATADA ---
            function createCherry(size, posX, posY, posZ) {
                const cGroup = new THREE.Group();
                
                // Cuerpo de la cereza (Achatada usando SphereGeometry con escala)
                const bodyGeo = new THREE.SphereGeometry(size, 32, 32);
                const bodyMat = new THREE.MeshPhongMaterial({ color: 0xdc1e23, shininess: 80 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.scale.set(1, 0.85, 1); // Achatar verticalmente
                
                // Tallo
                const stemMat = new THREE.MeshBasicMaterial({ color: 0x493026 });
                const stemGeo = new THREE.CylinderGeometry(size*0.04, size*0.04, size*2);
                const stem = new THREE.Mesh(stemGeo, stemMat);
                stem.position.set(size*0.3, size*1.2, 0);
                stem.rotation.z = -0.3;
                
                cGroup.add(body, stem);
                cGroup.position.set(posX, posY, posZ);
                
                // Atributos de animación aleatorios
                cGroup.userData = {
                    rotSpeed: Math.random() * 0.01 + 0.005,
                    floatOffset: Math.random() * Math.PI * 2
                };
                
                scene.add(cGroup);
                cherries.push(cGroup);
            }

            // --- DISTRIBUIR CEREZAS POR LA PANTALLA ---
            createCherry(0.5, 5, 2, -2);      // Derecha Arriba (Grande)
            createCherry(0.3, -4.5, 3, -1);   // Izquierda Arriba (Mediana)
            createCherry(0.4, 6, -1.5, -3);   // Derecha Abajo (Mediana)
            createCherry(0.2, -5.5, -3, -2);  // Izquierda Abajo (Pequeña)
            createCherry(0.35, 0, -5, -4);    // Centro Abajo (Fondo)

            camera.position.z = 7;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.0007;
            
            // Animar cada cereza
            cherries.forEach(cherry => {
                cherry.rotation.y += cherry.userData.rotSpeed;
                // Flotación sutil
                cherry.position.y += Math.sin(Date.now() * 0.001 + cherry.userData.floatOffset) * 0.005;
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
