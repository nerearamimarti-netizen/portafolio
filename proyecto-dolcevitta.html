<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <title>Magnum | Dolce Vitta</title>

    <style>
        :root {
            --cake-pink: #f6dede;
            --cake-dark: #493026;
            --cherry-red: #dc1e23;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--cake-pink); /* Color base siempre visible */
            color: var(--cake-dark);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- CANVAS THREE.JS (FONDO SIEMPRE ATRÁS) --- */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Asegura que esté detrás del contenido */
            pointer-events: none;
        }

        /* --- BOTÓN VOLVER --- */
        .back-home {
            position: fixed;
            top: 25px;
            right: 25px;
            background: var(--cake-dark);
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .back-home:hover { transform: scale(1.05); }

        /* --- CONTENIDO --- */
        .hero {
            height: 60vh;
            width: 100%;
            background: url("hero-dolcevitta.png") center/cover no-repeat;
            background-color: #e5d1d1; /* Fallback */
        }

        section {
            position: relative;
            padding: 60px 20px;
            max-width: 900px;
            margin: auto;
            z-index: 2; /* Por encima del canvas */
        }

        .description-box {
            background: rgba(255, 255, 255, 0.4);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 40px;
        }

        /* --- IMÁGENES --- */
        .img-project {
            width: 100%;
            display: block;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        .rrss-img {
            border-radius: 30px; /* Redondeado solo para esta */
            width: 100%;
            display: block;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .grid-2 {
            display: grid;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media(min-width:768px){
            .grid-2 { grid-template-columns: 1fr 1fr; }
        }

        /* --- HERRAMIENTAS --- */
        .icon-row {
            display: flex;
            justify-content: center;
            gap: 60px;
            padding: 40px 0;
        }

        .icon-floating {
            width: 70px;
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.15));
            animation: floatAnim 4s ease-in-out infinite;
        }

        @keyframes floatAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        footer {
            text-align: center;
            padding: 60px;
            font-weight: 600;
            opacity: 0.5;
        }

    </style>
</head>

<body>

    <div id="canvas-container"></div>

    <a class="back-home" href="index.html">← VOLVER</a>

    <header class="hero"></header>

    <section>
        <div class="description-box">
            <p><strong>Dolce Vitta</strong><br>Creación de identidad visual para una pastelería artesanal donde la delicadeza y el sabor se encuentran en cada detalle.</p>
        </div>
    </section>

    <section>
        <h2>Identidad Visual</h2>
        <img src="aplicaciones-dolcevitta.png" class="img-project" alt="Branding">
    </section>

    <section>
        <h2>Packaging</h2>
        <div class="grid-2">
            <img src="cuadrada-dolcevitta-izq.png" class="img-project" alt="Pack 1">
            <img src="cuadrada-dolcevitta-der.png" class="img-project" alt="Pack 2">
        </div>
        <img src="grande-dolcevitta.png" class="img-project" alt="Pack 3">
    </section>

    <section>
        <h2>Social Media Content</h2>
        <img src="imagen-rrss-dolcevitta.png" class="rrss-img" alt="Instagram">
    </section>

    <section>
        <h2>Herramientas utilizadas</h2>
        <div class="icon-row">
            <img src="photoshop.png" class="icon-floating" alt="Photoshop">
            <img src="ilustrador.png" class="icon-floating" alt="Illustrator" style="animation-delay: 0.5s;">
        </div>
    </section>

    <footer>© 2026 NEERGRAPHS • DOLCE VITTA</footer>

    <script>
        // CONFIGURACIÓN THREE.JS
        let scene, camera, renderer, points, cherry, croissant, muffin;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Luz
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(5, 5, 5);
            scene.add(light, new THREE.AmbientLight(0xffffff, 0.7));

            // Partículas
            const pGeo = new THREE.BufferGeometry();
            const pPos = [];
            for (let i = 0; i < 300; i++) pPos.push(Math.random()*20-10, Math.random()*20-10, Math.random()*20-10);
            pGeo.setAttribute('position', new THREE.Float32BufferAttribute(pPos, 3));
            points = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 }));
            scene.add(points);

            // CEREZA (DERECHA)
            const cGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), new THREE.MeshPhongMaterial({ color: 0xdc1e23 }));
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1), new THREE.MeshBasicMaterial({ color: 0x493026 }));
            stem.position.set(0.2, 0.6, 0);
            stem.rotation.z = -0.3;
            cGroup.add(body, stem);
            cGroup.position.set(4, 1, 0);
            scene.add(cGroup);
            cherry = cGroup;

            // CROISSANT (IZQUIERDA) - Forma simplificada
            const croiss = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.2, 8, 16), new THREE.MeshPhongMaterial({ color: 0xe3a857 }));
            croiss.position.set(-4.5, 2, 0);
            scene.add(croiss);
            croissant = croiss;

            // BOLLO (IZQUIERDA ABAJO)
            const muf = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.2, 0.5), new THREE.MeshPhongMaterial({ color: 0x8d5524 }));
            muf.position.set(-4, -2, 0);
            scene.add(muf);
            muffin = muf;

            camera.position.z = 6;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.001;
            
            cherry.rotation.y += 0.01;
            cherry.position.y = 1 + Math.sin(Date.now() * 0.002) * 0.2;
            
            croissant.rotation.x += 0.01;
            croissant.position.y = 2 + Math.cos(Date.now() * 0.0015) * 0.2;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
