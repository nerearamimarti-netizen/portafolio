<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<title>Magnum | Dolce Vitta</title>

<style>
/* --- ESTILOS GENERALES Y RESET --- */
:root {
  --brown-dark: #2b1b14;
  --brown-medium: #493026;
  --brown-light: #fff5f5; /* Un rosa pastel sutil para fondo */
  --accent: linear-gradient(270deg,#ff4ecd,#6c63ff);
  --cake-color: #f6dede; /* Rosa pastel para detalles */
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background-color: var(--brown-medium);
  color: white;
  overflow-x: hidden;
  position: relative;
  z-index: 1;
}

/* --- CANVAS THREE.JS (PASTRY WORLD) --- */
#canvas-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
}

/* --- BOTÓN VOLVER (MEJORADO) --- */
.back-home {
  position: fixed;
  top: 20px;
  right: 20px;
  background: var(--accent);
  padding: 12px 22px;
  border-radius: 999px;
  color: white;
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
  z-index: 1000;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.back-home:hover {
  transform: scale(1.1) translateY(-3px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.4);
}

/* --- HERO IMAGEN FULL --- */
.hero {
  height: 80vh;
  width: 100%;
  background: url("hero-dolcevitta.png") center/cover no-repeat;
  position: relative;
  border-bottom: 5px solid white; /* Un trazado blanco sutil en el hero */
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.3));
}

/* --- CONTENEDOR SECCIONES --- */
section {
  padding: 60px 20px;
  max-width: 1000px;
  margin: auto;
}

h2 {
  font-size: 1.8rem;
  font-weight: 800;
  margin-bottom: 30px;
}

/* Caja de descripción premium */
.description-box {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.06);
  padding: 30px;
  border-radius: 15px;
  backdrop-filter: blur(5px);
  text-align: center;
}

/* --- EFECTO IMÁGENES (SIN TRAZADO) --- */
img {
  width: 100%;
  transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
  display: block;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3); /* Sombra elegante */
}

img:hover {
  transform: scale(1.03);
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

/* --- GRIDS Y TARJETAS --- */
.grid-2 {
  display: grid;
  gap: 25px;
}

@media(min-width:768px){
  .grid-2 {
    grid-template-columns: 1fr 1fr;
  }
}

.img-container {
  overflow: hidden;
  border-radius: 12px;
}

.merch-img {
  width: 100%;
}

.square-img {
  width: 100%;
}

.billboard {
  width: 100%;
  border-radius: 12px;
  margin-top: 25px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.3);
}

/* RRSS */
.rrss-img {
  width: 100%;
}

/* --- HERRAMIENTAS ALINEADAS A LA IZQUIERDA --- */
.left-align-title {
  text-align: left;
}

.icon-row {
  display: flex;
  justify-content: flex-start; /* Alineado a la izquierda */
  gap: 30px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.icon-box {
  background: rgba(255, 255, 255, 0.03);
  padding: 15px;
  border-radius: 12px;
  width: 80px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 15px rgba(0,0,0,0.2); /* Sombrita suave */
  transition: transform 0.3s ease;
}

.icon-box:hover {
  transform: translateY(-5px);
}

.icon-box img {
  width: 50px;
  height: 50px;
  box-shadow: none; /* Quitar sombra de la imagen dentro de la caja */
}

/* --- FOOTER (MEJORADO) --- */
.footer-wrapper {
  position: relative;
  margin-top: 50px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.footer-image {
  position: absolute;
  inset: 0;
  background: url("footer-dolcevitta.png") center/cover no-repeat;
  filter: brightness(0.5); /* Oscurecer imagen de fondo */
  z-index: 1;
}

.footer-content {
  position: relative;
  z-index: 3;
  text-align: center;
}

.copyright-box {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
  padding: 10px 20px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.05);
}

</style>
</head>

<body>

<div id="canvas-container"></div>

<a class="back-home" href="index.html">← VOLVER</a>

<header class="hero"></header>

<section>
  <div class="description-box">
    <p><strong>Dolce Vitta:</strong> Creación integral de identidad visual, aplicaciones de marca, packaging premium y estrategia de contenido para redes sociales.</p>
  </div>
</section>

<section>
  <h2>Aplicaciones del logotipo</h2>
  <div class="img-container">
    <img src="aplicaciones-dolcevitta.png" class="merch-img" alt="Branding Applications">
  </div>
</section>

<section>
  <h2>Packaging</h2>
  <div class="grid-2">
    <div class="img-container">
      <img src="cuadrada-dolcevitta-izq.png" class="square-img" alt="Packaging Box 1">
    </div>
    <div class="img-container">
      <img src="cuadrada-dolcevitta-der.png" class="square-img" alt="Packaging Bag 1">
    </div>
  </div>
  <div class="img-container" style="margin-top: 25px;">
    <img src="grande-dolcevitta.png" class="billboard" alt="Premium Packaging Banner">
  </div>
</section>

<section>
  <h2>Contenido RRSS</h2>
  <div class="img-container">
    <img src="imagen-rrss-dolcevitta.png" class="rrss-img" alt="Social Media Content Feed">
  </div>
</section>

<section>
  <h2 class="left-align-title">Herramientas utilizadas</h2>
  <div class="icon-row">
    <div class="icon-box">
      <img src="aftereffects.png" alt="After Effects">
    </div>
    <div class="icon-box">
      <img src="premier.png" alt="Premiere">
    </div>
    <div class="icon-box">
      <img src="photoshop.png" alt="Photoshop">
    </div>
    <div class="icon-box">
      <img src="ilustrador.png" alt="Illustrator">
    </div>
  </div>
</section>

<div class="footer-wrapper">
  <div class="footer-image"></div>
  <div class="footer-content">
    <div class="copyright-box">© 2026 Neergraphs</div>
  </div>
</div>

<script>
  // CONFIGURACIÓN THREE.JS
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  // Luz
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5, 5, 5);
  scene.add(light, new THREE.AmbientLight(0xffffff, 0.6));

  // --- ELEMENTOS 3D TEMÁTICOS ---

  // 1. CEREZA (DERECHA)
  const cherryGroup = new THREE.Group();
  // Cuerpo de la cereza
  const cherryBody = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), new THREE.MeshPhongMaterial({ color: 0xdc1e23 }));
  // Tallo
  const cherryStem = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 1.2), new THREE.MeshBasicMaterial({ color: 0x493026 }));
  cherryStem.position.y = 0.7;
  cherryStem.rotation.z = 0.2;
  cherryGroup.add(cherryBody, cherryStem);
  cherryGroup.position.set(4, 1, 0); // Lado derecho
  scene.add(cherryGroup);

  // 2. CROISSANT (IZQUIERDA) - Forma simplificada
  const croissant = new THREE.Group();
  for(let i=0; i<3; i++) {
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(0.4 - (i*0.1), 0.15, 8, 16, Math.PI),
      new THREE.MeshPhongMaterial({ color: 0xe3a857 })
    );
    ring.rotation.y = Math.PI / 2;
    ring.position.x = i * 0.2;
    croissant.add(ring);
  }
  croissant.position.set(-4, 2, 0);
  scene.add(croissant);

  // 3. BOLLO / MUFFIN (IZQUIERDA ABAJO)
  const muffin = new THREE.Group();
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.2, 0.4, 16), new THREE.MeshPhongMaterial({ color: 0x8d5524 }));
  const top = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), new THREE.MeshPhongMaterial({ color: 0xf6dede }));
  top.position.y = 0.3;
  muffin.add(base, top);
  muffin.position.set(-4.5, -2, 0);
  scene.add(muffin);

  // Partículas
  const geometry = new THREE.BufferGeometry();
  const vertices = [];
  for (let i = 0; i < 300; i++) {
    vertices.push(Math.random() * 20 - 10, Math.random() * 20 - 10, Math.random() * 20 - 10);
  }
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  const points = new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.04 }));
  scene.add(points);

  camera.position.z = 5;

  function animate() {
    requestAnimationFrame(animate);
    points.rotation.y += 0.0005;
    
    // Animación de flotación individual
    cherryGroup.rotation.y += 0.01;
    cherryGroup.position.y = 1 + Math.sin(Date.now() * 0.0015) * 0.3;

    croissant.rotation.z += 0.005;
    croissant.position.y = 2 + Math.cos(Date.now() * 0.001) * 0.2;

    muffin.rotation.y += 0.01;
    muffin.position.y = -2 + Math.sin(Date.now() * 0.0012) * 0.2;

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
