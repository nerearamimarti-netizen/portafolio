<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <title>Magnum | Dolce Vitta</title>

    <style>
        :root {
            --cake-pink: #f6dede;
            --cake-dark: #493026;
            --cherry-red: #dc1e23;
            --glass: rgba(255, 255, 255, 0.6);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--cake-pink);
            color: var(--cake-dark);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- CANVAS THREE.JS --- */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* --- BOTÓN VOLVER --- */
        .back-home {
            position: fixed;
            top: 25px;
            right: 25px;
            background: var(--cake-dark);
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .back-home:hover {
            transform: scale(1.05);
            background: var(--cherry-red);
        }

        /* --- HERO --- */
        .hero {
            height: 70vh;
            width: 100%;
            background: url("hero-dolcevitta.png") center/cover no-repeat;
            position: relative;
            border-bottom: 8px solid white;
        }

        /* --- SECCIONES --- */
        section {
            padding: 60px 20px;
            max-width: 1000px;
            margin: auto;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }

        section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        h2 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 40px;
            text-align: center;
            color: var(--cake-dark);
        }

        .description-box {
            background: var(--glass);
            border: 2px solid white;
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            text-align: center;
            font-size: 1.1rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        /* --- IMÁGENES --- */
        .img-project {
            width: 100%;
            display: block;
            border-radius: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            transition: transform 0.5s ease;
            margin-bottom: 50px;
        }

        .img-project:hover {
            transform: scale(1.02);
        }

        .grid-2 {
            display: grid;
            gap: 40px;
            margin-bottom: 50px;
        }

        @media(min-width:768px){
            .grid-2 { grid-template-columns: 1fr 1fr; }
        }

        /* --- HERRAMIENTAS AL FINAL (FLOTANTES) --- */
        .tools-section {
            margin-bottom: 100px;
        }

        .icon-row {
            display: flex;
            justify-content: center;
            gap: 70px;
            padding: 50px 0;
        }

        .icon-floating {
            width: 75px;
            height: auto;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.15)); 
            animation: floatAnim 4s ease-in-out infinite;
        }

        @keyframes floatAnim {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }

        /* --- FOOTER --- */
        .footer-wrapper {
            background: white;
            padding: 40px;
            text-align: center;
        }

        .copyright-box {
            font-weight: 600;
            color: var(--cake-dark);
            letter-spacing: 1px;
        }

    </style>
</head>

<body>

<div id="canvas-container"></div>

<a class="back-home" href="index.html">← VOLVER</a>

<header class="hero"></header>

<section id="intro">
    <div class="description-box">
        <p><strong>Dolce Vitta</strong><br>Creación integral de identidad visual, aplicaciones de marca, packaging premium y estrategia de contenido para redes sociales.</p>
    </div>
</section>

<section>
    <h2>Identidad Visual</h2>
    <img src="aplicaciones-dolcevitta.png" class="img-project" alt="Branding">
</section>

<section>
    <h2>Packaging & Experiencia</h2>
    <div class="grid-2">
        <img src="cuadrada-dolcevitta-izq.png" class="img-project" alt="Packaging 1">
        <img src="cuadrada-dolcevitta-der.png" class="img-project" alt="Packaging 2">
    </div>
    <img src="grande-dolcevitta.png" class="img-project" alt="Banner Dolce Vitta">
</section>

<section>
    <h2>Social Media Content</h2>
    <img src="imagen-rrss-dolcevitta.png" class="img-project" alt="Instagram Feed">
</section>

<section class="tools-section">
    <h2>Herramientas utilizadas</h2>
    <div class="icon-row">
        <img src="photoshop.png" alt="Photoshop" class="icon-floating">
        <img src="ilustrador.png" alt="Illustrator" class="icon-floating" style="animation-delay: 0.5s;">
    </div>
</section>

<footer class="footer-wrapper">
    <div class="copyright-box">© 2026 NEERGRAPHS • DOLCE VITTA</div>
</footer>

<script>
    // --- THREE.JS EFFECT ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Partículas
    const geometry = new THREE.BufferGeometry();
    const vertices = [];
    const colors = [];
    const colorWhite = new THREE.Color(0xffffff);
    const colorCherry = new THREE.Color(0xdc1e23);

    for (let i = 0; i < 600; i++) {
        vertices.push(Math.random() * 20 - 10, Math.random() * 20 - 10, Math.random() * 20 - 10);
        const chosenColor = Math.random() > 0.8 ? colorCherry : colorWhite;
        colors.push(chosenColor.r, chosenColor.g, chosenColor.b);
    }
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({ size: 0.06, vertexColors: true, transparent: true, opacity: 0.7 });
    const points = new THREE.Points(geometry, material);
    scene.add(points);

    // --- FUNCIÓN PARA CREAR PAREJA DE CEREZAS ---
    function createCherryPair() {
        const group = new THREE.Group();
        const cherryGeo = new THREE.SphereGeometry(0.6, 32, 32);
        const cherryMat = new THREE.MeshPhongMaterial({ color: 0xdc1e23, shininess: 100 });
        
        const c1 = new THREE.Mesh(cherryGeo, cherryMat);
        const c2 = new THREE.Mesh(cherryGeo, cherryMat);
        c1.position.set(-0.4, 0, 0);
        c2.position.set(0.4, -0.2, 0.2);
        
        const stemMat = new THREE.MeshBasicMaterial({ color: 0x493026 });
        const stemCurve1 = new THREE.QuadraticBezierCurve3(
            new THREE.Vector3(-0.2, 0.5, 0),
            new THREE.Vector3(0.5, 1.5, 0),
            new THREE.Vector3(1, 2, 0)
        );
        const stemCurve2 = new THREE.QuadraticBezierCurve3(
            new THREE.Vector3(0.2, 0.5, 0),
            new THREE.Vector3(0.5, 1.5, 0),
            new THREE.Vector3(1, 2, 0)
        );
        
        const stem1 = new THREE.Mesh(new THREE.TubeGeometry(stemCurve1, 20, 0.05, 8, false), stemMat);
        const stem2 = new THREE.Mesh(new THREE.TubeGeometry(stemCurve2, 20, 0.05, 8, false), stemMat);

        group.add(c1, c2, stem1, stem2);
        return group;
    }

    // Cereza Derecha (Original)
    const cherryRight = createCherryPair();
    cherryRight.position.set(2.5, 0, -2);
    scene.add(cherryRight);

    // Cereza Izquierda (Nueva, un poco más pequeña)
    const cherryLeft = createCherryPair();
    cherryLeft.scale.set(0.7, 0.7, 0.7); // 30% más pequeña
    cherryLeft.position.set(-3, -1, -3); // Lado izquierdo y un poco más al fondo
    scene.add(cherryLeft);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    camera.position.z = 5;

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;
        
        points.rotation.y += 0.0008;
        
        // Animación Derecha
        cherryRight.rotation.y += 0.01;
        cherryRight.position.y = Math.sin(time) * 0.2;
        
        // Animación Izquierda (desfasada para que no sea idéntica)
        cherryLeft.rotation.y -= 0.008;
        cherryLeft.position.y = Math.sin(time + 1) * 0.15 - 1; 

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('section').forEach(s => observer.observe(s));
</script>

</body>
</html>
