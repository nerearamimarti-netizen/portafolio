<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <title>Magnum | Dolce Vitta</title>

    <style>
        :root {
            --cake-pink: #f6dede;
            --cake-dark: #493026;
            --cherry-red: #dc1e23;
            --glass: rgba(255, 255, 255, 0.6);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--cake-pink);
            color: var(--cake-dark);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- CANVAS THREE.JS --- */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* --- BOTÓN VOLVER --- */
        .back-home {
            position: fixed;
            top: 25px;
            right: 25px;
            background: var(--cake-dark);
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .back-home:hover {
            transform: scale(1.05);
            background: var(--cherry-red);
        }

        /* --- HERO --- */
        .hero {
            height: 70vh;
            width: 100%;
            background: url("hero-dolcevitta.png") center/cover no-repeat;
            position: relative;
            border-bottom: 8px solid white;
        }

        /* --- SECCIONES --- */
        section {
            padding: 60px 20px;
            max-width: 1000px;
            margin: auto;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }

        section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 30px;
            text-align: center;
            color: var(--cake-dark);
        }

        .description-box {
            background: var(--glass);
            border: 2px solid white;
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            text-align: center;
            font-size: 1.1rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        /* --- HERRAMIENTAS --- */
        .icon-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .icon-box {
            background: white;
            padding: 15px;
            border-radius: 18px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08); /* Sombrita suave */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(220, 30, 35, 0.2);
        }

        .icon-box img {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        /* --- GRID IMÁGENES --- */
        .grid-2 {
            display: grid;
            gap: 30px;
        }

        @media(min-width:768px){
            .grid-2 { grid-template-columns: 1fr 1fr; }
        }

        .img-container {
            overflow: hidden;
            border-radius: 25px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 5px solid white;
        }

        .img-container img {
            width: 100%;
            display: block;
            transition: transform 0.6s ease;
        }

        .img-container:hover img {
            transform: scale(1.03);
        }

        .full-img {
            width: 100%;
            border-radius: 25px;
            margin-top: 30px;
            border: 5px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        /* --- FOOTER --- */
        .footer-wrapper {
            background: white;
            padding: 40px;
            text-align: center;
            margin-top: 50px;
        }

        .copyright-box {
            font-weight: 600;
            color: var(--cake-dark);
            letter-spacing: 1px;
        }

    </style>
</head>

<body>

<div id="canvas-container"></div>

<a class="back-home" href="index.html">← VOLVER</a>

<header class="hero"></header>

<section id="intro">
    <div class="description-box">
        <p><strong>Dolce Vitta</strong><br>Creación integral de identidad visual, aplicaciones de marca, packaging premium y estrategia de contenido para redes sociales.</p>
    </div>
</section>

<section>
    <h2>Herramientas utilizadas</h2>
    <div class="icon-row">
        <div class="icon-box">
            <img src="aftereffects.png" alt="After Effects">
        </div>
        <div class="icon-box">
            <img src="premier.png" alt="Premiere">
        </div>
        <div class="icon-box">
            <img src="photoshop.png" alt="Photoshop">
        </div>
        <div class="icon-box">
            <img src="ilustrador.png" alt="Illustrator">
        </div>
    </div>
</section>

<section>
    <h2>Identidad Visual</h2>
    <div class="img-container">
        <img src="aplicaciones-dolcevitta.png" alt="Branding">
    </div>
</section>

<section>
    <h2>Packaging & Experiencia</h2>
    <div class="grid-2">
        <div class="img-container">
            <img src="cuadrada-dolcevitta-izq.png" alt="Packaging 1">
        </div>
        <div class="img-container">
            <img src="cuadrada-dolcevitta-der.png" alt="Packaging 2">
        </div>
    </div>
    <img src="grande-dolcevitta.png" class="full-img" alt="Banner Dolce Vitta">
</section>

<section>
    <h2>Social Media Content</h2>
    <div class="img-container">
        <img src="imagen-rrss-dolcevitta.png" alt="Instagram Feed">
    </div>
</section>

<footer class="footer-wrapper">
    <div class="copyright-box">© 2026 NEERGRAPHS • DOLCE VITTA</div>
</footer>

<script>
    // --- THREE.JS EFFECT (CHERRY & TOPPINGS) ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Partículas (Mezcla de blanco y rojo cereza)
    const geometry = new THREE.BufferGeometry();
    const vertices = [];
    const colors = [];
    const colorWhite = new THREE.Color(0xffffff);
    const colorCherry = new THREE.Color(0xdc1e23);

    for (let i = 0; i < 600; i++) {
        vertices.push(Math.random() * 20 - 10, Math.random() * 20 - 10, Math.random() * 20 - 10);
        const chosenColor = Math.random() > 0.8 ? colorCherry : colorWhite;
        colors.push(chosenColor.r, chosenColor.g, chosenColor.b);
    }
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({ size: 0.06, vertexColors: true, transparent: true, opacity: 0.7 });
    const points = new THREE.Points(geometry, material);
    scene.add(points);

    // --- LA CEREZA (Isotipo 3D) ---
    const cherryGroup = new THREE.Group();
    
    // Cuerpo de la cereza (dos esferas rojas)
    const cherryGeo = new THREE.SphereGeometry(0.6, 32, 32);
    const cherryMat = new THREE.MeshPhongMaterial({ color: 0xdc1e23, shininess: 100 });
    
    const c1 = new THREE.Mesh(cherryGeo, cherryMat);
    const c2 = new THREE.Mesh(cherryGeo, cherryMat);
    c1.position.set(-0.4, 0, 0);
    c2.position.set(0.4, -0.2, 0.2);
    
    // Tallo (curva)
    const stemCurve = new THREE.QuadraticBezierCurve3(
        new THREE.Vector3(-0.2, 0.5, 0),
        new THREE.Vector3(0.5, 1.5, 0),
        new THREE.Vector3(1, 2, 0)
    );
    const stemGeo = new THREE.TubeGeometry(stemCurve, 20, 0.05, 8, false);
    const stemMat = new THREE.MeshBasicMaterial({ color: 0x493026 });
    const stem = new THREE.Mesh(stemGeo, stemMat);

    cherryGroup.add(c1, c2, stem);
    cherryGroup.position.set(2, 0, -2); // Posicionada un poco al lateral
    scene.add(cherryGroup);

    // Luz para que brille la cereza
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    camera.position.z = 5;

    function animate() {
        requestAnimationFrame(animate);
        points.rotation.y += 0.0008;
        cherryGroup.rotation.y += 0.01;
        cherryGroup.position.y = Math.sin(Date.now() * 0.001) * 0.2;
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- SCROLL REVEAL ---
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('section').forEach(s => observer.observe(s));
</script>

</body>
</html>
