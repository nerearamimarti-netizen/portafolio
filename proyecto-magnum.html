<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<title>Magnum</title>

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #493026;
  color: white;
  overflow-x: hidden;
}

/* =========================
BOTÓN VOLVER (CORREGIDO)
========================= */
.back-home {
  position: fixed;
  top: 18px;
  right: 18px;
  background: linear-gradient(270deg,#ff4ecd,#6c63ff);
  padding: 14px 20px;
  border-radius: 999px;
  text-decoration: none;
  color: white;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 999;
  transition: transform 0.3s ease;
  overflow: hidden;
}

/* flecha */
.back-home span {
  display: inline-block;
  transition: transform 0.4s ease;
}

/* hover botón */
.back-home:hover {
  transform: scale(1.08);
}

/* flecha sale hacia la izquierda pero visible */
.back-home:hover span {
  transform: translateX(-25px);
  opacity: 1;
}

/* =========================
HERO (CORRECTO)
========================= */
.hero {
  width: 100%;
  height: 70vh;
  background: url("Magnum-hero.png") center/cover no-repeat;
  background-color: #493026;
}

/* =========================
SECCIONES
========================= */
section {
  padding: 25px 20px;
  max-width: 1100px;
  margin: auto;
}

/* =========================
ACORDEÓN (ORIGINAL RESTAURADO)
========================= */
.accordion {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

@media(min-width:768px){
  .accordion {
    grid-template-columns: repeat(3, 1fr);
  }
}

.accordion-item button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #2b1b14;
  color: white;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

/* flecha simple */
.arrow {
  font-size: 18px;
  transition: transform 0.3s ease;
}

.open .arrow {
  transform: rotate(180deg);
}

/* contenido */
.accordion-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
  background: rgba(0,0,0,0.2);
  padding: 0 10px;
  border-radius: 0 0 10px 10px;
}

/* =========================
MERCHANDISING (HOVER + SOMBRA)
========================= */
.merch-img {
  width: 100%;
  border-radius: 10px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.35);
  transition: transform 0.3s ease;
}

.merch-img:hover {
  transform: scale(1.05);
}

/* =========================
CARTELERÍA EXTERIOR
========================= */
.grid-2 {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

@media(min-width:768px){
  .grid-2 {
    grid-template-columns: 1fr 1fr;
  }
}

/* cuadradas */
.square-img {
  width: 90%;
  margin: auto;
  display: block;
  border-radius: 10px;
  transition: transform 0.3s ease;
}

.square-img:hover {
  transform: scale(1.05);
}

/* billboard */
.billboard {
  width: 100%;
  margin-top: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.35);
  transition: transform 0.3s ease;
}

.billboard:hover {
  transform: scale(1.03);
}

/* separación extra entre bloques */
section h2 {
  margin-bottom: 20px;
}

/* =========================
RRSS
========================= */
.rrss-img {
  width: 100%;
  border-radius: 10px;
}

/* =========================
VIDEO
========================= */
.video-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: 12px;
  overflow: hidden;
}

.video-wrapper iframe {
  width: 100%;
  height: 100%;
  border: 0;
}

/* =========================
FOOTER
========================= */
.footer-wrapper {
  width: 100%;
  position: relative;
  margin-top: 50px;
}

.footer-gradient {
  position: absolute;
  top: 0;
  width: 100%;
  height: 120px;
  background: linear-gradient(to bottom, #493026, transparent);
  z-index: 2;
}

.footer-image {
  width: 100%;
  height: 140px;
  background: url("footer-nuevo.png") center/cover no-repeat;
}

.footer-text {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  transform: translateY(-50%);
  z-index: 3;
}

.copyright-box {
  display: inline-block;
  background: rgba(0,0,0,0.5);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
}

</style>
</head>

<body>

<a class="back-home" href="index.html">
← <span>Volver</span>
</a>

<!-- HERO -->
<section class="hero"></section>

<!-- DESCRIPCIÓN -->
<section>

<p><strong>Proyecto conceptual ficticio</strong> desarrollado para Magnum.</p>

<h2>Concepto de campaña</h2>

<div class="accordion">

<div class="accordion-item">
<button onclick="toggleAccordion(this)">
<strong>Tensión</strong>
<span class="arrow">⌄</span>
</button>
<div class="accordion-content">
<p><strong>En invierno el helado parece prohibido</strong>.</p>
</div>
</div>

<div class="accordion-item">
<button onclick="toggleAccordion(this)">
<strong>Insight</strong>
<span class="arrow">⌄</span>
</button>
<div class="accordion-content">
<p><strong>Asociar Magnum con momentos cálidos</strong>.</p>
</div>
</div>

<div class="accordion-item">
<button onclick="toggleAccordion(this)">
<strong>Idea</strong>
<span class="arrow">⌄</span>
</button>
<div class="accordion-content">
<p><strong>Magnum acompaña el invierno</strong>.</p>
</div>
</div>

</div>

</section>

<!-- MERCH -->
<section>
<h2>Merchandising</h2>

<div class="grid-2">
<img src="merchandising-magnum-izquierda.png" class="merch-img">
<img src="merchandising-magnum-derecha.png" class="merch-img">
</div>
</section>

<!-- CARTELERÍA EXTERIOR -->
<section>
<h2>Cartelería exterior</h2>

<div class="grid-2">
<img src="magnum-cuadrada-izquierda.png" class="square-img">
<img src="magnum-cuadrada-derecha.png" class="square-img">
</div>

<img src="billboard-magnum.png" class="billboard">

</section>

<!-- RRSS -->
<section>
<h2>Contenido para RRSS</h2>
<img src="rrss_magnum.png" class="rrss-img">
</section>

<!-- VIDEO -->
<section>
<h2>Vídeo campaña</h2>

<div class="video-wrapper">
<iframe src="https://www.youtube.com/embed/dPMp22JkiI0" allowfullscreen></iframe>
</div>

</section>

<!-- FOOTER -->
<div class="footer-wrapper">

<div class="footer-gradient"></div>

<div class="footer-text">
  <div class="copyright-box">© 2026 Neergraphs</div>
</div>

<div class="footer-image"></div>

</div>

<script>
function toggleAccordion(button){
  const item = button.parentElement;
  const content = button.nextElementSibling;

  item.classList.toggle("open");

  if(content.style.maxHeight){
    content.style.maxHeight = null;
  } else {
    content.style.maxHeight = content.scrollHeight + "px";
  }
}
</script>

</body>
</html>
